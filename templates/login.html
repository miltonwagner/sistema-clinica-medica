<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial;
        }

        .box {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 10px #ccc;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 5px 0;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">

    <img src="{{ url_for('static', filename='img/logo.jpg') }}"
         style="width: 100px; margin-bottom: 10px;">

    <h2>Clínica Médica</h2>

    <form method="POST">
        <input name="usuario" placeholder="Usuário">
        <input name="senha" type="password" placeholder="Senha">
        <button>Entrar</button>
    </form>

</div>

</body>
</html>
