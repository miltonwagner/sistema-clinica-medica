<!DOCTYPE html>
<html>
<head>
    <title>Clínica Médica</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- NAVBAR FIXA PROFISSIONAL -->
<nav class="navbar navbar-dark bg-dark">

    <div class="container-fluid">

        <div class="d-flex align-items-center">

            <img src="{{ url_for('static', filename='img/logo.jpg') }}"
                 style="width: 45px; margin-right: 10px; border-radius: 8px;">

            <span class="navbar-brand mb-0 h1">
                Clínica Médica
            </span>

        </div>

        <div>
            <a href="/menu" class="btn btn-secondary btn-sm me-2">Menu</a>
            <a href="/logout" class="btn btn-danger btn-sm">Sair</a>
        </div>

    </div>

</nav>

<!-- CONTEÚDO -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
