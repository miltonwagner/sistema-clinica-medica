<!DOCTYPE html>
<html>
<head>
    <title>Clínica Médica</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            height: 90vh;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            text-align: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .topo {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 80px;
        }

        h1 {
            font-size: 22px;
            color: #2c3e50;
            margin: 10px 0;
        }

        .clinica {
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
        }

        .botoes {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 12px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .entrar {
            background-color: #3498db;
        }

        .sair {
            background-color: #e74c3c;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="topo">
        <img src="{{ url_for('static', filename='img/logo.jpg') }}" class="logo">
        <h1>Clínica Médica</h1>
        <img src="{{ url_for('static', filename='img/clinica.jpg') }}" class="clinica">
    </div>

    <div class="botoes">
        <a href="/login" class="btn entrar">Acessar Sistema</a>
        <a href="/logout" class="btn sair">Sair</a>
    </div>

</div>

</body>
</html>
